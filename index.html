<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>心情日记</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
    <style>
        :root{--bg:#f8f6f1;--card:#fff;--t1:#2c2a27;--t2:#7a7672;--t3:#b5b0a9;--accent:#7c9a82;--accent-bg:#eef3ef;--border:#e8e4de}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Noto Sans SC",sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;max-width:500px;margin:0 auto}
        .app{padding-bottom:80px;min-height:100vh}
        .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:#fff;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 20px;z-index:100}
        .nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;color:var(--t3);font-size:11px;cursor:pointer;padding:4px 16px}
        .nav-item.active{color:var(--accent)}
        .nav-item .icon{font-size:22px}
        .header{padding:20px 24px 0}
        .greeting{font-size:22px;font-weight:600;margin-bottom:4px}
        .date-str{font-size:13px;color:var(--t3)}
        .prompt-card{margin:20px 24px;padding:16px;background:var(--accent-bg);border-radius:12px;font-size:14px;color:var(--t2);line-height:1.6}
        .fragment-section{margin:0 24px 20px}
        .fragment-title{font-size:13px;color:var(--t3);margin-bottom:10px}
        .fragment-input-row{display:flex;gap:8px;margin-bottom:12px}
        .fragment-input-row input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:20px;font-size:14px;outline:none;background:#fff}
        .fragment-input-row input:focus{border-color:var(--accent)}
        .fragment-input-row button{padding:10px 18px;background:var(--accent);color:#fff;border:none;border-radius:20px;font-size:14px;cursor:pointer;white-space:nowrap}
        .fragment-list{display:flex;flex-direction:column;gap:6px}
        .fragment-item{padding:10px 14px;background:#fff;border-radius:10px;font-size:13px;color:var(--t2);border:1px solid var(--border)}
        .fragment-item .time{color:var(--t3);margin-right:8px;font-size:12px}
        .write-link{display:block;text-align:center;margin:16px 24px;padding:12px;color:var(--accent);font-size:14px;cursor:pointer}
        .section-title{font-size:13px;color:var(--t3);margin:0 24px 10px}
        .mood-row{display:flex;gap:10px;padding:0 24px;overflow-x:auto;margin-bottom:20px}
        .mood-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 12px;background:#fff;border:2px solid var(--border);border-radius:12px;cursor:pointer;min-width:60px;font-size:11px;color:var(--t2)}
        .mood-btn.selected{border-color:var(--accent);background:var(--accent-bg)}
        .mood-btn .emoji{font-size:24px}
        .entry-list{padding:0 24px}
        .entry-card{padding:14px;background:#fff;border-radius:12px;margin-bottom:10px;border:1px solid var(--border);cursor:pointer}
        .entry-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
        .entry-card-date{font-size:13px;color:var(--t3)}
        .entry-card-mood{font-size:18px}
        .entry-card-text{font-size:14px;color:var(--t2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .write-view{padding:20px 24px}
        .write-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .back-btn{background:none;border:none;font-size:14px;color:var(--t2);cursor:pointer}
        .save-btn{padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:20px;font-size:14px;cursor:pointer}
        .write-date{font-size:14px;color:var(--t2)}
        .write-textarea{width:100%;min-height:200px;padding:16px;border:1px solid var(--border);border-radius:12px;font-size:15px;line-height:1.8;resize:none;outline:none;background:#fff;font-family:inherit;margin-bottom:16px}
        .write-textarea:focus{border-color:var(--accent)}
        .saved-toast{text-align:center;color:var(--accent);font-size:13px;margin-top:8px}
        .calendar-view{padding:20px 24px}
        .cal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .cal-header h2{font-size:18px}
        .cal-nav{background:none;border:none;font-size:20px;cursor:pointer;color:var(--t2);padding:4px 8px}
        .cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:12px;color:var(--t3);margin-bottom:8px}
        .cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
        .cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;font-size:13px;cursor:pointer;border:none;background:none;color:var(--t1);gap:2px}
        .cal-day.empty{pointer-events:none}
        .cal-day.today{background:var(--accent-bg);font-weight:600}
        .cal-day.has-entry{background:#fff;border:1px solid var(--border)}
        .cal-day .cal-emoji{font-size:12px}
        .detail-view{padding:20px 24px}
        .detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .detail-mood{font-size:32px;margin-bottom:16px;text-align:center}
        .detail-text{font-size:15px;line-height:1.8;white-space:pre-wrap;margin-bottom:20px}
        .detail-fragments-title{font-size:13px;color:var(--t3);margin-bottom:8px;margin-top:16px}
        .export-view{padding:20px 24px}
        .export-btn{display:block;width:100%;padding:14px;margin-bottom:10px;background:#fff;border:1px solid var(--border);border-radius:12px;font-size:14px;cursor:pointer;color:var(--t1)}
        .export-btn:hover{border-color:var(--accent)}
        .search-bar{margin:16px 24px}
        .search-bar input{width:100%;padding:10px 16px;border:1px solid var(--border);border-radius:20px;font-size:14px;outline:none;background:#fff}
        .search-bar input:focus{border-color:var(--accent)}
        .no-entry{text-align:center;color:var(--t3);font-size:14px;padding:40px 0}
        .edit-btn{background:none;border:1px solid var(--accent);color:var(--accent);padding:6px 16px;border-radius:16px;font-size:13px;cursor:pointer}
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

const moods = [
    { emoji: "😊", label: "平静" },
    { emoji: "😄", label: "开心" },
    { emoji: "😢", label: "低落" },
    { emoji: "😤", label: "烦躁" },
    { emoji: "😴", label: "疲惫" },
    { emoji: "🤔", label: "思考" },
    { emoji: "🥰", label: "温暖" },
    { emoji: "😶", label: "说不清" },
];

const prompts = [
    "今天，有什么想对自己说的吗",
    "此刻的你，感觉怎么样",
    "今天有什么小事让你停了一下",
    "如果用一个词形容今天，会是什么",
];

const getDateKey = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const formatDate = (key) => { const [y,m,d] = key.split('-'); return `${y}年${parseInt(m)}月${parseInt(d)}日`; };

const loadEntries = () => { try { const s = localStorage.getItem('diaryEntries'); return s ? JSON.parse(s) : {}; } catch { return {}; } };

function DiaryApp() {
    const [view, setView] = useState('home');
    const [entries, setEntries] = useState(loadEntries);
    const [text, setText] = useState('');
    const [selectedMood, setSelectedMood] = useState(null);
    const [fragments, setFragments] = useState([]);
    const [fragmentInput, setFragmentInput] = useState('');
    const [calMonth, setCalMonth] = useState(() => new Date());
    const [viewingDate, setViewingDate] = useState(null);
    const [saved, setSaved] = useState(false);
    const [isEditing, setIsEditing] = useState(false);
    const [editText, setEditText] = useState('');
    const [editMood, setEditMood] = useState(null);
    const [editFragments, setEditFragments] = useState([]);
    const [editFragmentInput, setEditFragmentInput] = useState('');
    const [searchQuery, setSearchQuery] = useState('');

    const today = new Date();
    const todayKey = getDateKey(today);
    const weekdays = ['日','一','二','三','四','五','六'];
    const dateStr = `${today.getMonth()+1}月${today.getDate()}日`;
    const dayStr = `星期${weekdays[today.getDay()]}`;
    const prompt = useMemo(() => prompts[Math.floor(Math.random()*prompts.length)], []);

    const getGreeting = () => { const h = today.getHours(); if(h<6) return '夜深了'; if(h<12) return '早上好'; if(h<14) return '中午好'; if(h<18) return '下午好'; if(h<22) return '晚上好'; return '夜深了'; };

    // 页面加载时读取今天的数据
    useEffect(() => {
        const e = entries[todayKey];
        if (e) { setText(e.text||''); setSelectedMood(e.mood??null); setFragments(e.fragments||[]); }
        else { setText(''); setSelectedMood(null); setFragments([]); }
    }, [todayKey]);

    // ★ 关键修复：entries 变化时自动保存到 localStorage
    useEffect(() => {
        localStorage.setItem('diaryEntries', JSON.stringify(entries));
    }, [entries]);

    // 通用更新函数
    const updateEntry = useCallback((key, updates) => {
        setEntries(prev => {
            const existing = prev[key] || { text:'', mood:null, fragments:[] };
            return { ...prev, [key]: { ...existing, ...updates } };
        });
    }, []);

    // ★ 关键修复：随手记 → 立刻保存到 entries
    const addFragment = () => {
        if (!fragmentInput.trim()) return;
        const now = new Date();
        const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        const newFragments = [...fragments, { text: fragmentInput.trim(), time }];
        setFragments(newFragments);
        setFragmentInput('');
        updateEntry(todayKey, { fragments: newFragments });
    };

    // ★ 关键修复：选心情 → 立刻保存
    const selectMood = (index) => {
        setSelectedMood(index);
        updateEntry(todayKey, { mood: index });
    };

    const startWrite = () => {
        const e = entries[todayKey];
        if(e){ setText(e.text||''); setSelectedMood(e.mood??null); }
        setView('write');
    };

    const handleSave = () => {
        updateEntry(todayKey, { text: text.trim(), mood: selectedMood, fragments });
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
    };

    // 日历
    const calYear = calMonth.getFullYear();
    const calMon = calMonth.getMonth();
    const daysInMonth = new Date(calYear, calMon+1, 0).getDate();
    const firstDay = new Date(calYear, calMon, 1).getDay();
    const calDays = [];
    for(let i=0;i<firstDay;i++) calDays.push(null);
    for(let i=1;i<=daysInMonth;i++) calDays.push(i);

    // 搜索
    const filteredKeys = useMemo(() => {
        if(!searchQuery.trim()) return null;
        const q = searchQuery.toLowerCase();
        return Object.keys(entries).filter(key => {
            const e = entries[key];
            if(e.text && e.text.toLowerCase().includes(q)) return true;
            if(e.fragments?.some(f => f.text.toLowerCase().includes(q))) return true;
            if(e.mood!==null && e.mood!==undefined && moods[e.mood]?.label.includes(q)) return true;
            return false;
        });
    }, [searchQuery, entries]);

    const viewDetail = (key) => { setViewingDate(key); setIsEditing(false); setView('detail'); };

    const startEditing = () => {
        if(!viewingDate||!entries[viewingDate]) return;
        const e = entries[viewingDate];
        setEditText(e.text||''); setEditMood(e.mood??null); setEditFragments(e.fragments||[]); setEditFragmentInput(''); setIsEditing(true);
    };

    const saveEdit = () => {
        if(!viewingDate) return;
        updateEntry(viewingDate, { text:editText.trim(), mood:editMood, fragments:editFragments });
        setIsEditing(false);
    };

    const addEditFragment = () => {
        if(!editFragmentInput.trim()) return;
        const now = new Date();
        const time = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        setEditFragments(prev => [...prev, { text:editFragmentInput.trim(), time }]);
        setEditFragmentInput('');
    };

    const exportAsText = () => {
        const keys = Object.keys(entries).sort();
        if(!keys.length){ alert('还没有日记可以导出'); return; }
        let c = "我的心情日记\n\n";
        keys.forEach(key => {
            const e = entries[key];
            c += `📅 ${formatDate(key)}`; if(e.mood!==null&&e.mood!==undefined) c+=` ${moods[e.mood]?.emoji||''}`; c+='\n';
            if(e.text) c+=`${e.text}\n`;
            if(e.fragments?.length) e.fragments.forEach(f => { c+=`  ${f.time} ${f.text}\n`; });
            c+='\n';
        });
        const blob = new Blob([c],{type:'text/plain;charset=utf-8'}); const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href=url; a.download=`心情日记_${todayKey}.txt`; a.click(); URL.revokeObjectURL(url);
    };

    const exportAsJSON = () => {
        const keys = Object.keys(entries);
        if(!keys.length){ alert('还没有日记可以导出'); return; }
        const blob = new Blob([JSON.stringify(entries,null,2)],{type:'application/json'}); const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href=url; a.download=`心情日记_${todayKey}.json`; a.click(); URL.revokeObjectURL(url);
    };

    const sortedKeys = Object.keys(entries).sort((a,b) => b.localeCompare(a));

    // ===== HOME =====
    const renderHome = () => (
        <div>
            <div className="header">
                <div className="greeting">{getGreeting()} 👋</div>
                <div className="date-str">{dateStr} {dayStr}</div>
            </div>
            <div className="prompt-card">{prompt}</div>
            <div className="fragment-section">
                <div className="fragment-title">随手记一句，不用想太多</div>
                <div className="fragment-input-row">
                    <input value={fragmentInput} onChange={e=>setFragmentInput(e.target.value)} placeholder="这一刻在想什么..." onKeyDown={e=>e.key==='Enter'&&addFragment()} />
                    <button onClick={addFragment}>记下</button>
                </div>
                {fragments.length>0 && <div className="fragment-list">{fragments.map((f,i)=>(<div key={i} className="fragment-item"><span className="time">{f.time}</span>{f.text}</div>))}</div>}
            </div>
            <div className="write-link" onClick={startWrite}>想多写几句？去写日记 →</div>
            <div className="section-title">今天的心情</div>
            <div className="mood-row">
                {moods.map((m,i)=>(<button key={i} className={`mood-btn ${selectedMood===i?'selected':''}`} onClick={()=>selectMood(i)}><span className="emoji">{m.emoji}</span>{m.label}</button>))}
            </div>
            <div className="search-bar"><input placeholder="搜索日记..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} /></div>
            <div className="section-title">{searchQuery.trim()?'搜索结果':'最近的日记'}</div>
            <div className="entry-list">
                {(searchQuery.trim()?filteredKeys:sortedKeys)?.filter(key=>{const e=entries[key];return e.text||(e.fragments&&e.fragments.length>0)||e.mood!==null;}).slice(0,10).map(key=>{
                    const e=entries[key]; const dt=e.text||(e.fragments?.length?`${e.fragments[0].text}...`:'');
                    return (<div key={key} className="entry-card" onClick={()=>viewDetail(key)}>
                        <div className="entry-card-header"><span className="entry-card-date">{formatDate(key)}</span>{e.mood!==null&&e.mood!==undefined&&<span className="entry-card-mood">{moods[e.mood]?.emoji}</span>}</div>
                        {dt&&<div className="entry-card-text">{dt}</div>}
                    </div>);
                })}
            </div>
        </div>
    );

    // ===== WRITE =====
    const renderWrite = () => (
        <div className="write-view">
            <div className="write-header">
                <button className="back-btn" onClick={()=>setView('home')}>← 返回</button>
                <span className="write-date">{dateStr}</span>
                <button className="save-btn" onClick={handleSave}>保存</button>
            </div>
            <div className="section-title" style={{margin:'0 0 10px'}}>选择心情</div>
            <div className="mood-row" style={{padding:0,marginBottom:16}}>
                {moods.map((m,i)=>(<button key={i} className={`mood-btn ${selectedMood===i?'selected':''}`} onClick={()=>setSelectedMood(i)}><span className="emoji">{m.emoji}</span>{m.label}</button>))}
            </div>
            <textarea className="write-textarea" value={text} onChange={e=>setText(e.target.value)} placeholder="写下今天的故事..." />
            {saved && <div className="saved-toast">✓ 已保存</div>}
        </div>
    );

    // ===== CALENDAR =====
    const renderCalendar = () => (
        <div className="calendar-view">
            <div className="cal-header">
                <button className="cal-nav" onClick={()=>setCalMonth(new Date(calYear,calMon-1))}>‹</button>
                <h2>{calYear}年{calMon+1}月</h2>
                <button className="cal-nav" onClick={()=>setCalMonth(new Date(calYear,calMon+1))}>›</button>
            </div>
            <div className="cal-weekdays">{weekdays.map(d=><div key={d}>{d}</div>)}</div>
            <div className="cal-days">
                {calDays.map((day,i)=>{
                    if(day===null) return <div key={i} className="cal-day empty"/>;
                    const key=`${calYear}-${String(calMon+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                    const entry=entries[key]; const hasEntry=entry&&(entry.text||entry.fragments?.length||entry.mood!==null); const isToday=key===todayKey;
                    return (<button key={i} className={`cal-day ${isToday?'today':''} ${hasEntry?'has-entry':''}`} onClick={()=>hasEntry&&viewDetail(key)}>
                        {day}{entry?.mood!==null&&entry?.mood!==undefined&&<span className="cal-emoji">{moods[entry.mood]?.emoji}</span>}
                    </button>);
                })}
            </div>
        </div>
    );

    // ===== DETAIL =====
    const renderDetail = () => {
        const entry = entries[viewingDate]||{};
        if(isEditing) return (
            <div className="write-view">
                <div className="write-header">
                    <button className="back-btn" onClick={()=>setIsEditing(false)}>← 取消</button>
                    <span className="write-date">{formatDate(viewingDate)}</span>
                    <button className="save-btn" onClick={saveEdit}>保存</button>
                </div>
                <div className="mood-row" style={{padding:0,marginBottom:16}}>
                    {moods.map((m,i)=>(<button key={i} className={`mood-btn ${editMood===i?'selected':''}`} onClick={()=>setEditMood(i)}><span className="emoji">{m.emoji}</span>{m.label}</button>))}
                </div>
                <textarea className="write-textarea" value={editText} onChange={e=>setEditText(e.target.value)} placeholder="写点什么..." />
                <div className="fragment-section" style={{margin:0}}>
                    <div className="fragment-title">碎片记录</div>
                    <div className="fragment-input-row">
                        <input value={editFragmentInput} onChange={e=>setEditFragmentInput(e.target.value)} placeholder="补充一条..." onKeyDown={e=>e.key==='Enter'&&addEditFragment()} />
                        <button onClick={addEditFragment}>添加</button>
                    </div>
                    {editFragments.length>0&&<div className="fragment-list">{editFragments.map((f,i)=>(<div key={i} className="fragment-item"><span className="time">{f.time}</span>{f.text}</div>))}</div>}
                </div>
            </div>
        );
        return (
            <div className="detail-view">
                <div className="detail-header">
                    <button className="back-btn" onClick={()=>setView('calendar')}>← 返回</button>
                    <span>{formatDate(viewingDate)}</span>
                    <button className="edit-btn" onClick={startEditing}>编辑</button>
                </div>
                {entry.mood!==null&&entry.mood!==undefined&&<div className="detail-mood">{moods[entry.mood]?.emoji} {moods[entry.mood]?.label}</div>}
                {entry.text&&<div className="detail-text">{entry.text}</div>}
                {entry.fragments?.length>0&&<div><div className="detail-fragments-title">碎片记录</div><div className="fragment-list">{entry.fragments.map((f,i)=>(<div key={i} className="fragment-item"><span className="time">{f.time}</span>{f.text}</div>))}</div></div>}
                {!entry.text&&!entry.fragments?.length&&(entry.mood===null||entry.mood===undefined)&&<div className="no-entry">这天还没有记录</div>}
            </div>
        );
    };

    // ===== EXPORT =====
    const renderExport = () => (
        <div className="export-view">
            <div className="write-header" style={{marginBottom:20}}>
                <button className="back-btn" onClick={()=>setView('home')}>← 返回</button>
                <span>导出日记</span>
                <div style={{width:40}}/>
            </div>
            <p style={{fontSize:14,color:'var(--t2)',marginBottom:20}}>选择导出格式</p>
            <button className="export-btn" onClick={exportAsText}>📄 导出为文本文件 (.txt)</button>
            <button className="export-btn" onClick={exportAsJSON}>💾 导出为 JSON 数据</button>
            <p style={{fontSize:12,color:'var(--t3)',marginTop:20,lineHeight:1.6}}>提示：日记数据保存在浏览器本地，清除浏览器数据会导致日记丢失。建议定期导出备份。</p>
        </div>
    );

    return (
        <div className="app">
            {view==='home'&&renderHome()}
            {view==='write'&&renderWrite()}
            {view==='calendar'&&renderCalendar()}
            {view==='detail'&&renderDetail()}
            {view==='export'&&renderExport()}
            <div className="bottom-nav">
                <button className={`nav-item ${view==='home'?'active':''}`} onClick={()=>setView('home')}><span className="icon">🏠</span>首页</button>
                <button className={`nav-item ${view==='calendar'?'active':''}`} onClick={()=>setView('calendar')}><span className="icon">📅</span>日历</button>
                <button className={`nav-item ${view==='export'?'active':''}`} onClick={()=>setView('export')}><span className="icon">📦</span>导出</button>
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<DiaryApp/>);
</script>
</body>
</html>
